name: Build and Deploy to GitHub Pages
run-name: Build and Deploy to GitHub Pages
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Enable Corepack
        run: corepack enable

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: 🧰 Enable Corepack (Yarn v4)
        run: |
          corepack enable
          corepack install

      - name: 🏗️ Install Dependencies
        run: |
          yarn install --immutable

      - name: 🖼️ Generate Image Variants
        run: |
          yarn image:variants

      - name: ✅ Lint
        run: |
          yarn lint

      - name: 🧪 Test
        run: |
          yarn test

      - name: 🔎 Typecheck
        run: |
          yarn typecheck

      - name: 🏗️ Build
        run: |
          yarn build

  playwright:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🎭 Playwright Smoke Tests
        run: |
          docker compose run --rm playwright-smoke

      - name: 🖼️ Playwright Visual Tests
        run: |
          docker compose run --rm playwright-visual

  deploy:
    runs-on: ubuntu-latest
    needs:
      - verify
      - playwright

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Enable Corepack
        run: corepack enable

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: 🧰 Enable Corepack (Yarn v4)
        run: |
          corepack enable
          corepack install

      - name: 🏗️ Install Dependencies
        run: |
          yarn install --immutable

      - name: 🖼️ Generate Image Variants
        run: |
          yarn image:variants

      - name: 🏗️ Build
        run: |
          yarn build:prod

      - name: 🚢 Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: out

  playwright-live:
    runs-on: ubuntu-latest
    needs:
      - deploy

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: ⏳ Wait for alexleung.ca to serve the new deploy marker
        run: |
          set -euo pipefail

          for attempt in $(seq 1 30); do
            deploy_marker="$(curl --fail --silent --show-error --location https://alexleung.ca/deploy-meta.json || true)"

            if printf '%s' "${deploy_marker}" | grep -Eq "\"sha\"[[:space:]]*:[[:space:]]*\"${GITHUB_SHA}\""; then
              exit 0
            fi

            echo "alexleung.ca has not served deploy-meta.json for ${GITHUB_SHA} yet; retrying in 10s (${attempt}/30)"
            sleep 10
          done

          echo "alexleung.ca did not serve deploy-meta.json for ${GITHUB_SHA} within 5 minutes"
          exit 1

      - name: 🎭 Playwright Live Smoke Tests
        run: |
          docker compose run --rm -e PLAYWRIGHT_BASE_URL=https://alexleung.ca playwright-smoke
