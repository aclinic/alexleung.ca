name: PR Checks

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Typecheck, Build, Lint, and Tests
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_ENABLE_ANALYTICS: "false"

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Enable Corepack
        run: corepack enable

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: 🧰 Enable Corepack (Yarn v4)
        run: |
          corepack enable
          corepack install

      - name: 🏗️ Install Dependencies
        run: yarn install --immutable

      - name: 🖼️ Generate Image Variants
        run: yarn image:variants

      - name: ✅ Lint
        run: yarn lint

      - name: 🧪 Test
        run: yarn test

      - name: 🔎 Typecheck
        run: yarn typecheck

      - name: 🏗️ Build
        run: yarn build

  playwright:
    name: Playwright Docker E2E
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_ENABLE_ANALYTICS: "false"

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🎭 Playwright Smoke Tests
        run: docker compose run --rm playwright-smoke

      - name: 🖼️ Playwright Visual Tests
        run: docker compose run --rm playwright-visual
